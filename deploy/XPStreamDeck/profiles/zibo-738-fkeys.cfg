# Zibo 738 function-key profile derived from:
# /Volumes/X-Plane 12/Output/preferences/control profiles/Zibo 738 - Keys.prf
#
# Layout convention:
# - key.0 maps Escape (Master Caution)
# - key.1 .. key.11 continue the Zibo utility bindings in compact order
# - key.12 .. key.14 remain spare on the 15-key deck
#
# profile_id=zibo-738-fkeys
# tailnum=YOUR-TAILNUM
# Format: key.<index>=<command>|<mode>
# Format: label.<index>=TEXT or TEXT\nTEXT
# Format: text_scale.<index>=1..6 (caps auto text size)
# Format: bg.<index>/fg.<index>/accent.<index>=#RRGGBB or named-color
# mode: once | hold | pulse


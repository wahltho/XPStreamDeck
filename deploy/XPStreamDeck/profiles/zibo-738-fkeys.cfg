# Zibo 738 function-key profile derived from:
# /Volumes/X-Plane 12/Output/preferences/control profiles/Zibo 738 - Keys.prf
#
# Layout convention:
# - key.0  .. key.11 mirror F1 .. F12
# - key.5 is intentionally left free because F6 has no current binding
# - key.12 .. key.14 remain spare on the 15-key deck
#
# Format: key.<index>=<command>|<mode>
# Format: label.<index>=TEXT or TEXT\nTEXT
# mode: once | hold

label.0=EFB
key.0=laminar/B738/tab/toggle|once

label.1=RELOAD
key.1=YAL/forcereload|once

label.2=GND\nSPD
key.2=sim/operation/ground_speed_change|once

label.3=SHOT
key.3=sim/operation/screenshot|once

label.4=FPS
key.4=sim/operation/show_fps|once

label.5=FREE

label.6=IVAO
key.6=ivao_monitor/toggle_connect|once

label.7=OFP
key.7=YANSH/fetchOFP|once

label.8=PROC
key.8=YAL/cycleprocedures|once

label.9=PB\nPLAN
key.9=BetterPushback/start_planner|once

label.10=PUSH
key.10=BetterPushback/start|once

label.11=TAXI
key.11=YAL/toggleautotaxiing|once
